<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Quiz App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <div class="container login-page">
        <h1>Login to Quiz</h1>
        <p class="intro">Enter your username and email to start the quiz. Existing users can log in with the same email.</p>

        {% if error %}
        <div class="error-text">{{ error }}</div>
        {% endif %}

        <form class="login-form" method="post" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" class="input-field" value="{{ username|default('') }}" required />
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" class="input-field" value="{{ email|default('') }}" required />
            </div>

            <button type="submit" class="button primary">Login</button>
        </form>
    </div>
</body>
</html>
